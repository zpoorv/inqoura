<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inqoura Admin Reports</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="admin-shell" hidden data-admin-root>
      <aside class="sidebar">
        <div class="brand-block">
          <p class="eyebrow-pill">Inqoura</p>
          <h1>Admin Panel</h1>
          <p>Control products, people, and app behavior from one place.</p>
        </div>
        <nav class="sidebar-nav">
          <a data-nav-link="dashboard" href="./dashboard.html">Dashboard</a>
          <a data-nav-link="products" href="./products.html">Products</a>
          <a data-nav-link="reports" href="./reports.html">Reports</a>
          <a data-nav-link="users" href="./users.html">Users</a>
          <a data-nav-link="config" href="./config.html">App Config</a>
        </nav>
        <div class="sidebar-footer">
          <div class="session-card">
            <p class="eyebrow">Signed in</p>
            <strong id="sessionName">Admin</strong>
            <span id="sessionEmail" class="muted">-</span>
          </div>
          <button id="logoutButton" class="ghost-button" type="button">Log Out</button>
        </div>
      </aside>

      <main class="page-content">
        <header class="page-header">
          <div>
            <p class="eyebrow">Reports</p>
            <h2>Trust review queue</h2>
            <p class="muted">Review product issues sent from the app and jump straight into the right override page.</p>
          </div>
        </header>

        <section class="panel-card">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Queue</p>
              <h3>Open reports</h3>
            </div>
          </div>
          <div id="reportsStatus" class="status-panel" aria-live="polite"></div>
          <div id="reportsList" class="list-stack"></div>
        </section>
      </main>
    </div>

    <script src="/config.js"></script>
    <script type="module" src="./reports.js"></script>
  </body>
</html>
